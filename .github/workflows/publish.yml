name: Publish site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it half way.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the version the site is authored against. No R or Python
      # toolchain is needed: no post executes code. The post-render redirect
      # step uses python3, which ubuntu-latest ships with.
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Render site
        run: quarto render

      - name: Check internal links and assets
        run: python3 scripts/check_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
