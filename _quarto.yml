project:
  type: website
  output-dir: _site
  post-render:
    # Quarto's `aliases:` stubs are JS-only; make them work without JS and
    # point search engines at the new URL. See scripts/enhance_redirects.py.
    - python3 scripts/enhance_redirects.py
  render:
    - "*.qmd"
    - "posts/"
    - "!context/"
    - "!docs/"

website:
  title: "Glenn Moncrieff"
  site-url: https://gmoncrieff.github.io
  favicon: assets/logo.svg
  search: false
  navbar:
    logo: assets/logo.svg
    title: "Glenn Moncrieff"
    right:
      - text: "Home"
        href: index.qmd
      - text: "Papers"
        href: papers.qmd
      - text: "Blog"
        href: blog.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Contact"
        href: contact.qmd
  page-footer:
    left: "© 2026 Glenn Moncrieff"
    center:
      - text: "Papers"
        href: papers.qmd
      - text: "Blog"
        href: blog.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Contact"
        href: contact.qmd
    right: "Cape Town · South Africa"

format:
  html:
    theme: theme/custom.scss
    include-in-header: theme/fonts.html
    page-layout: full
    toc: false
    anchor-sections: false
    highlight-style: github
    grid:
      body-width: 1120px

execute:
  freeze: auto
